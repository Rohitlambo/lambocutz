
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Lambocutz — Admin</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
    }

    header {
      text-align: center;
      padding: 40px 20px 20px;
      border-bottom: 1px solid #1a1a1a;
    }

    header h1 { font-size: 2rem; font-weight: 900; letter-spacing: 4px; }
    header h1 span { color: #FFD700; }
    header p { color: #FFD700; font-size: 0.8rem; letter-spacing: 2px; text-transform: uppercase; margin-top: 5px; }

    .container { max-width: 900px; margin: 0 auto; padding: 30px 20px 60px; }

    /* ── TAB NAV ── */
    .tab-nav {
      display: flex;
      gap: 8px;
      margin-bottom: 30px;
      flex-wrap: wrap;
      border-bottom: 1px solid #1e1e1e;
      padding-bottom: 0;
    }

    .tab-btn {
      padding: 10px 20px;
      background: none;
      border: none;
      border-bottom: 3px solid transparent;
      color: #555;
      font-size: 0.85rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: -1px;
    }

    .tab-btn:hover { color: #FFD700; }
    .tab-btn.active { color: #FFD700; border-bottom-color: #FFD700; }

    .tab-panel { display: none; }
    .tab-panel.active { display: block; }

    /* ── STATS ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
      gap: 15px;
      margin-bottom: 35px;
    }

    .stat-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 12px;
      padding: 20px;
      text-align: center;
    }

    .stat-card .number { font-size: 2rem; font-weight: 900; color: #FFD700; }
    .stat-card .label { font-size: 0.75rem; color: #aaa; letter-spacing: 1px; text-transform: uppercase; margin-top: 5px; }

    .section-title {
      font-size: 0.8rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #FFD700;
      margin-bottom: 15px;
      margin-top: 35px;
    }

    .section-title:first-child { margin-top: 0; }

    /* ── AVAILABILITY ── */
    .availability-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 25px;
    }

    .hours-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 20px;
    }

    .hours-row label { font-size: 0.8rem; color: #aaa; letter-spacing: 1px; }

    .hours-row select {
      padding: 10px 14px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      color: #fff;
      font-size: 0.9rem;
      outline: none;
    }

    .hours-row select:focus { border-color: #FFD700; }

    .save-hours-btn {
      padding: 10px 20px;
      background: #FFD700;
      color: #000;
      font-weight: 800;
      font-size: 0.82rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      letter-spacing: 1px;
    }

    .save-hours-btn:hover { background: #e6c200; }

    .add-date-row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
    }

    .add-date-row input[type="date"] {
      padding: 12px 16px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      flex: 1;
      min-width: 180px;
    }

    .add-date-row input[type="date"]:focus { border-color: #FFD700; }

    .add-btn {
      padding: 12px 24px;
      background: #FFD700;
      color: #000;
      font-weight: 800;
      font-size: 0.85rem;
      letter-spacing: 1px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .add-btn:hover { background: #e6c200; }

    .date-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 20px; }

    .date-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 14px;
      font-size: 0.85rem;
    }

    .chip-date { color: #fff; }
    .chip-slots { color: #FFD700; font-size: 0.75rem; }

    .remove-btn {
      background: none;
      border: none;
      color: #ff4444;
      cursor: pointer;
      font-size: 1rem;
      line-height: 1;
      padding: 0 2px;
    }

    .remove-btn:hover { color: #ff0000; }
    .no-dates { color: #444; font-size: 0.9rem; padding: 10px 0; }

    /* ── BOOKING CARDS ── */
    .booking-filters { display: flex; gap: 10px; margin-bottom: 15px; flex-wrap: wrap; }

    .filter-btn {
      padding: 8px 18px;
      border-radius: 8px;
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      border: 1px solid #333;
      background: #1e1e1e;
      color: #aaa;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .filter-btn.active { background: #FFD700; color: #000; border-color: #FFD700; }

    .booking-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
      flex-wrap: wrap;
    }

    .booking-card.cancelled { opacity: 0.4; border-color: #ff444422; }
    .booking-card.done { border-color: #00cc6622; }

    .booking-info h3 { font-size: 1rem; font-weight: 700; margin-bottom: 6px; }
    .booking-info p { font-size: 0.82rem; color: #aaa; margin-bottom: 4px; }
    .booking-info p span { color: #fff; }

    .status-badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 6px;
      font-size: 0.72rem;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-top: 6px;
      margin-right: 4px;
    }

    .badge-confirmed { background: #1a3a5c; color: #5bb8ff; }
    .badge-done { background: #0d2e1a; color: #00cc66; }
    .badge-cancelled { background: #2e0d0d; color: #ff4444; }
    .badge-paid { background: #2e2500; color: #FFD700; }
    .badge-unpaid { background: #1a1a1a; color: #666; }

    .booking-actions { display: flex; flex-direction: column; gap: 8px; min-width: 120px; }

    .action-btn {
      padding: 8px 14px;
      border-radius: 8px;
      font-size: 0.78rem;
      font-weight: 700;
      cursor: pointer;
      border: none;
      letter-spacing: 0.5px;
      text-align: center;
      transition: opacity 0.2s;
    }

    .action-btn:hover { opacity: 0.8; }
    .btn-paid   { background: #FFD700; color: #000; }
    .btn-done   { background: #00cc66; color: #000; }
    .btn-cancel { background: #1e1e1e; color: #ff4444; border: 1px solid #333; }
    .btn-approve { background: #00cc66; color: #000; }
    .btn-reject  { background: #1e1e1e; color: #ff4444; border: 1px solid #333; }
    .btn-delete  { background: #2e0d0d; color: #ff4444; border: 1px solid #ff444433; }

    .no-bookings { text-align: center; color: #444; padding: 40px 20px; font-size: 0.9rem; }

    /* ── REVIEW CARDS ── */
    .review-admin-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 14px;
      padding: 18px 20px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 15px;
      flex-wrap: wrap;
    }

    .review-admin-card.pending  { border-left: 3px solid #FFD700; }
    .review-admin-card.approved { border-left: 3px solid #00cc66; opacity: 0.7; }
    .review-admin-card.rejected { border-left: 3px solid #ff4444; opacity: 0.4; }

    .review-info .reviewer-name {
      font-weight: 700;
      font-size: 0.95rem;
      margin-bottom: 4px;
    }

    .review-info .review-stars {
      font-size: 1rem;
      letter-spacing: 2px;
      margin-bottom: 6px;
    }

    .review-info .review-comment {
      font-size: 0.85rem;
      color: #aaa;
      line-height: 1.5;
      max-width: 500px;
    }

    .review-info .review-meta {
      font-size: 0.75rem;
      color: #555;
      margin-top: 6px;
    }

    .review-actions {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 110px;
    }

    .review-filter-row {
      display: flex;
      gap: 10px;
      margin-bottom: 15px;
      flex-wrap: wrap;
    }

    /* ── PROFILE FORM ── */
    .profile-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 28px;
    }

    .profile-preview {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
      padding-bottom: 24px;
      border-bottom: 1px solid #1e1e1e;
      flex-wrap: wrap;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #FFD700;
      background: #1e1e1e;
      flex-shrink: 0;
    }

    .profile-avatar-fallback {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      border: 2px solid #FFD700;
      background: #1e1e1e;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      flex-shrink: 0;
    }

    .profile-preview-info h3 {
      font-size: 1.1rem;
      color: #FFD700;
      margin-bottom: 4px;
    }

    .profile-preview-info p {
      font-size: 0.82rem;
      color: #555;
    }

    .form-group {
      margin-bottom: 18px;
    }

    .form-group label {
      display: block;
      font-size: 0.75rem;
      color: #888;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 7px;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      background: #1e1e1e;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      color: #fff;
      font-size: 0.95rem;
      outline: none;
      font-family: inherit;
      resize: none;
      transition: border-color 0.2s;
    }

    .form-group input:focus,
    .form-group textarea:focus { border-color: #FFD700; }

    .form-group .hint {
      font-size: 0.75rem;
      color: #444;
      margin-top: 5px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    @media (max-width: 500px) { .form-row { grid-template-columns: 1fr; } }

    .save-profile-btn {
      width: 100%;
      padding: 14px;
      background: #FFD700;
      color: #000;
      font-weight: 800;
      font-size: 0.9rem;
      letter-spacing: 2px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      text-transform: uppercase;
      margin-top: 6px;
      transition: opacity 0.2s;
    }

    .save-profile-btn:hover { opacity: 0.88; }

    .profile-msg {
      text-align: center;
      margin-top: 12px;
      font-size: 0.88rem;
      min-height: 18px;
    }

    .profile-msg.success { color: #00cc66; }
    .profile-msg.error   { color: #ff4444; }

    /* ── LOCATION CARD ── */
    .location-card {
      background: #141414;
      border: 1px solid #222;
      border-radius: 16px;
      padding: 25px;
      margin-top: 20px;
    }

    /* ── DANGER ZONE ── */
    .danger-zone {
      margin-top: 50px;
      border: 1px solid #2e0d0d;
      border-radius: 12px;
      padding: 20px;
    }

    .danger-zone h3 { color: #ff4444; font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }

    .danger-btn {
      padding: 10px 20px;
      background: #2e0d0d;
      color: #ff4444;
      border: 1px solid #ff444433;
      border-radius: 8px;
      font-size: 0.82rem;
      cursor: pointer;
      font-weight: 600;
    }

    .danger-btn:hover { background: #3e1010; }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: #FFD700;
      color: #000;
      padding: 12px 24px;
      border-radius: 10px;
      font-weight: 700;
      font-size: 0.9rem;
      display: none;
      z-index: 999;
      max-width: 280px;
    }

    /* ── PENDING BADGE ── */
    .pending-dot {
      display: inline-block;
      background: #ff4444;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 800;
      border-radius: 10px;
      padding: 1px 6px;
      margin-left: 5px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

  <header>
    <h1>LAMBO<span>CUTZ</span></h1>
    <p>⚙️ Admin Dashboard</p>
  </header>

  <div class="container">

    <div class="stats" id="statsRow"></div>

    <div class="tab-nav">
      <button class="tab-btn active" onclick="switchTab('bookings', this)">📋 Bookings</button>
      <button class="tab-btn" onclick="switchTab('availability', this)">📅 Availability</button>
      <button class="tab-btn" onclick="switchTab('reviews', this)" id="reviewsTabBtn">
        ⭐ Reviews
      </button>
      <button class="tab-btn" onclick="switchTab('profile', this)">👤 Profile</button>
    </div>

    <div class="tab-panel active" id="tab-bookings">
      <div class="booking-filters">
        <button class="filter-btn active" onclick="filterBookings('all', this)">All</button>
        <button class="filter-btn" onclick="filterBookings('confirmed', this)">Confirmed</button>
        <button class="filter-btn" onclick="filterBookings('done', this)">Done</button>
        <button class="filter-btn" onclick="filterBookings('cancelled', this)">Cancelled</button>
      </div>

      <div id="bookingsList"></div>

      <div class="danger-zone">
        <h3>⚠️ Danger Zone</h3>
        <button class="danger-btn" onclick="clearAllBookings()">Clear All Bookings</button>
      </div>
    </div>

    <div class="tab-panel" id="tab-availability">
      <p class="section-title">🕐 Opening Hours</p>
      <div class="availability-card">
        <div class="hours-row">
          <label>START</label>
          <select id="startHour"></select>
          <label>END</label>
          <select id="endHour"></select>
          <button class="save-hours-btn" onclick="saveHours()">Save Hours</button>
          <span style="color:#aaa; font-size:0.8rem;">1 hr slots</span>
        </div>

        <div class="add-date-row">
          <input type="date" id="newDate"/>
          <button class="add-btn" onclick="addDate()">+ Add Day</button>
        </div>

        <div class="date-chips" id="dateChips"></div>
      </div>

      <p class="section-title">📍 Location</p>
      <div class="location-card">
        <div class="form-group">
          <label>Location Display Text</label>
          <input type="text" id="locationText" placeholder="e.g. 123 Main St, Unit 02-01"/>
          <p class="hint">Shown in the booking bar on the main page.</p>
        </div>
        <div class="form-group">
          <label>Google Maps URL</label>
          <input type="text" id="locationUrl" placeholder="http://maps.google.com/..."/>
          <p class="hint">Tapping the location bar opens this link.</p>
        </div>
        <button class="save-hours-btn" onclick="saveLocation()">Save Location</button>
      </div>
    </div>

    <div class="tab-panel" id="tab-reviews">
      <div class="review-filter-row">
        <button class="filter-btn active" onclick="filterReviews('all', this)">All</button>
        <button class="filter-btn" onclick="filterReviews('pending', this)">
          Pending <span class="pending-dot" id="pendingCount">0</span>
        </button>
        <button class="filter-btn" onclick="filterReviews('approved', this)">Approved</button>
        <button class="filter-btn" onclick="filterReviews('rejected', this)">Rejected</button>
      </div>

      <div id="reviewsList"></div>
    </div>

    <div class="tab-panel" id="tab-profile">
      <p class="section-title">🖼️ Barber Profile</p>
      <div class="profile-card">
        <div class="profile-preview">
          <div class="profile-avatar-fallback" id="adminAvatarFallback">💈</div>
          <img id="adminAvatarImg" class="profile-avatar"
               src="" alt="Avatar" style="display:none"
               onerror="this.style.display='none'; document.getElementById('adminAvatarFallback').style.display='flex'"/>
          <div class="profile-preview-info">
            <h3 id="previewTitle">LAMBOCUTZ</h3>
            <p id="previewSocials">No social links set</p>
          </div>
        </div>

        <div class="form-group">
          <label>Bio</label>
          <textarea id="profileBio" rows="4"
            placeholder="Fresh cuts, clean fades. Book your slot today."></textarea>
        </div>

        <div class="form-group">
          <label>Photo URL</label>
          <input type="url" id="profilePhoto"
            placeholder="https://..." oninput="previewAvatar()"/>
          <p class="hint">Direct image link (JPG / PNG / WebP).</p>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Instagram Handle</label>
            <input type="text" id="profileIG" placeholder="@lambocutz"
              oninput="previewSocials()"/>
          </div>
          <div class="form-group">
            <label>TikTok Handle</label>
            <input type="text" id="profileTT" placeholder="@lambocutz"
              oninput="previewSocials()"/>
          </div>
        </div>

        <button class="save-profile-btn" onclick="saveProfile()">
          💾 Save Profile
        </button>
        <div class="profile-msg" id="profileMsg"></div>
      </div>
    </div>

  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ══════════════════════════════════════════════════════════
    // STATE
    // ══════════════════════════════════════════════════════════
    let allBookings = [];
    let allReviews  = [];
    let currentFilter       = 'all';
    let currentReviewFilter = 'all';
    let settings = {};

    // ══════════════════════════════════════════════════════════
    // INIT
    // ══════════════════════════════════════════════════════════
    async function init() {
      populateHourDropdowns();
      await Promise.all([loadSettings(), loadBookings(), loadReviews(), loadProfile()]);
    }

    // ══════════════════════════════════════════════════════════
    // TABS
    // ══════════════════════════════════════════════════════════
    function switchTab(name, btn) {
      document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.getElementById('tab-' + name).classList.add('active');
      btn.classList.add('active');
    }

    // ══════════════════════════════════════════════════════════
    // TOAST
    // ══════════════════════════════════════════════════════════
    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.style.display = 'block';
      setTimeout(() => t.style.display = 'none', 2500);
    }

    // ══════════════════════════════════════════════════════════
    // DROPDOWNS HELPERS
    // ══════════════════════════════════════════════════════════
    function populateHourDropdowns() {
      const startSelect = document.getElementById('startHour');
      const endSelect = document.getElementById('endHour');
      startSelect.innerHTML = '';
      endSelect.innerHTML = '';
      
      for(let i = 0; i <= 24; i++) {
        const label = i < 12 ? (i === 0 ? '12 AM' : i + ' AM') : (i === 12 ? '12 PM' : (i - 12) + ' PM');
        const val = i < 10 ? '0' + i + ':00' : i + ':00';
        
        if (i < 24) startSelect.options.add(new Option(label, val));
        if (i > 0) endSelect.options.add(new Option(label, val));
      }
    }

    // ══════════════════════════════════════════════════════════
    // SETTINGS & LOCATION
    // ══════════════════════════════════════════════════════════
    async function loadSettings() {
      try {
        const res = await fetch('/api/settings');
        settings  = await res.json();
        document.getElementById('startHour').value = settings.start_hour || "09:00";
        document.getElementById('endHour').value   = settings.end_hour || "18:00";
        document.getElementById('locationText').value = settings.location || "";
        document.getElementById('locationUrl').value = settings.location_url || "";
        renderDateChips();
      } catch (err) {
        console.error("Failed to load settings:", err);
      }
    }

    async function saveHours() {
      const start = document.getElementById('startHour').value;
      const end = document.getElementById('endHour').value;
      try {
        const res = await fetch('/api/settings/hours', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ start_hour: start, end_hour: end })
        });
        if (res.ok) showToast("Opening hours saved!");
      } catch (err) {
        showToast("Error saving hours.");
      }
    }

    async function saveLocation() {
      const text = document.getElementById('locationText').value.trim();
      const url = document.getElementById('locationUrl').value.trim();
      try {
        const res = await fetch('/api/settings/location', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ location: text, location_url: url })
        });
        if (res.ok) showToast("Location updated successfully!");
      } catch (err) {
        showToast("Error saving location.");
      }
    }

    function renderDateChips() {
      const container = document.getElementById('dateChips');
      container.innerHTML = '';
      if (!settings.available_dates || settings.available_dates.length === 0) {
        container.innerHTML = '<div class="no-dates">No business dates added yet.</div>';
        return;
      }
      settings.available_dates.sort().forEach(dateStr => {
        const chip = document.createElement('div');
        chip.className = 'date-chip';
        chip.innerHTML = `
          <span class="chip-date">${dateStr}</span>
          <button class="remove-btn" onclick="removeDate('${dateStr}')">×</button>
        `;
        container.appendChild(chip);
      });
    }

    async function addDate() {
      const input = document.getElementById('newDate');
      const dateVal = input.value;
      if (!dateVal) return alert("Select a valid date!");
      try {
        const res = await fetch('/api/settings/dates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: dateVal, action: 'add' })
        });
        if (res.ok) {
          if (!settings.available_dates) settings.available_dates = [];
          if (!settings.available_dates.includes(dateVal)) settings.available_dates.push(dateVal);
          renderDateChips();
          input.value = '';
          showToast("Day added!");
        }
      } catch (err) {
        showToast("Error adding day.");
      }
    }

    async function removeDate(dateStr) {
      if (!confirm(`Remove availability for ${dateStr}?`)) return;
      try {
        const res = await fetch('/api/settings/dates', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ date: dateStr, action: 'remove' })
        });
        if (res.ok) {
          settings.available_dates = settings.available_dates.filter(d => d !== dateStr);
          renderDateChips();
          showToast("Day removed!");
        }
      } catch (err) {
        showToast("Error removing day.");
      }
    }

    // ══════════════════════════════════════════════════════════
    // BOOKINGS
    // ══════════════════════════════════════════════════════════
    async function loadBookings() {
      try {
        const res = await fetch('/api/admin/bookings');
        allBookings = await res.json();
        renderBookings();
        renderStats();
      } catch (err) {
        console.error("Failed to load bookings:", err);
      }
    }

    function filterBookings(status, btn) {
      currentFilter = status;
      document.querySelectorAll('#tab-bookings .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderBookings();
    }

    function renderBookings() {
      const container = document.getElementById('bookingsList');
      container.innerHTML = '';
      
      const filtered = allBookings.filter(b => {
        if (currentFilter === 'all') return true;
        return b.status === currentFilter;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-bookings">No bookings matching this filter.</div>';
        return;
      }

      filtered.forEach(b => {
        const card = document.createElement('div');
        card.className = `booking-card ${b.status}`;
        card.innerHTML = `
          <div class="booking-info">
            <h3>${b.name}</h3>
            <p>📱 WhatsApp: <span>${b.phone}</span></p>
            <p>📅 Schedule: <span>${b.date} @ ${b.time}</span></p>
            <div>
              <span class="status-badge badge-${b.status}">${b.status}</span>
              <span class="status-badge badge-${b.payment_status || 'unpaid'}">${b.payment_status || 'unpaid'}</span>
            </div>
          </div>
          <div class="booking-actions">
            ${b.status === 'confirmed' ? `<button class="action-btn btn-done" onclick="updateBookingStatus('${b.id}', 'done')">Complete Cut</button>` : ''}
            ${b.payment_status !== 'paid' ? `<button class="action-btn btn-paid" onclick="updateBookingPayment('${b.id}', 'paid')">Mark Paid</button>` : ''}
            ${b.status !== 'cancelled' && b.status !== 'done' ? `<button class="action-btn btn-cancel" onclick="updateBookingStatus('${b.id}', 'cancelled')">Cancel</button>` : ''}
            <button class="action-btn btn-delete" onclick="deleteBooking('${b.id}')">Delete</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function updateBookingStatus(id, status) {
      try {
        const res = await fetch(`/api/admin/bookings/${id}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (res.ok) {
          allBookings = allBookings.map(b => b.id == id ? { ...b, status } : b);
          renderBookings();
          renderStats();
          showToast(`Booking ${status}!`);
        }
      } catch (err) {
        showToast("Error updating status.");
      }
    }

    async function updateBookingPayment(id, payment_status) {
      try {
        const res = await fetch(`/api/admin/bookings/${id}/payment`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ payment_status })
        });
        if (res.ok) {
          allBookings = allBookings.map(b => b.id == id ? { ...b, payment_status } : b);
          renderBookings();
          renderStats();
          showToast("Marked as paid!");
        }
      } catch (err) {
        showToast("Error updating payment.");
      }
    }

    async function deleteBooking(id) {
      if (!confirm("Permanently delete this structural record?")) return;
      try {
        const res = await fetch(`/api/admin/bookings/${id}`, { method: 'DELETE' });
        if (res.ok) {
          allBookings = allBookings.filter(b => b.id != id);
          renderBookings();
          renderStats();
          showToast("Record deleted.");
        }
      } catch (err) {
        showToast("Error removing record.");
      }
    }

    async function clearAllBookings() {
      if (!confirm("CRITICAL WARNING: Wipe out ALL system bookings completely? This is irreversible.")) return;
      try {
        const res = await fetch('/api/admin/bookings/clear', { method: 'POST' });
        if (res.ok) {
          allBookings = [];
          renderBookings();
          renderStats();
          showToast("All databases cleared.");
        }
      } catch (err) {
        showToast("Clear system action failed.");
      }
    }

    // ══════════════════════════════════════════════════════════
    // STATS
    // ══════════════════════════════════════════════════════════
    function renderStats() {
      const statsRow = document.getElementById('statsRow');
      const activeCuts = allBookings.filter(b => b.status === 'confirmed').length;
      const totalEarnings = allBookings.filter(b => b.payment_status === 'paid').length * 10;
      
      statsRow.innerHTML = `
        <div class="stat-card">
          <div class="number">${activeCuts}</div>
          <div class="label">Pending Cuts</div>
        </div>
        <div class="stat-card">
          <div class="number">$${totalEarnings}</div>
          <div class="label">Total Collected</div>
        </div>
        <div class="stat-card">
          <div class="number">${allBookings.length}</div>
          <div class="label">Total Handled</div>
        </div>
      `;
    }

    // ══════════════════════════════════════════════════════════
    // REVIEWS
    // ══════════════════════════════════════════════════════════
    async function loadReviews() {
      try {
        const res = await fetch('/api/admin/reviews');
        allReviews = await res.json();
        renderReviews();
      } catch (err) {
        console.error("Failed to load reviews:", err);
      }
    }

    function filterReviews(status, btn) {
      currentReviewFilter = status;
      document.querySelectorAll('#tab-reviews .filter-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      renderReviews();
    }

    function renderReviews() {
      const container = document.getElementById('reviewsList');
      const pendingBadge = document.getElementById('pendingCount');
      container.innerHTML = '';

      const pendingCount = allReviews.filter(r => r.status === 'pending').length;
      pendingBadge.textContent = pendingCount;

      const filtered = allReviews.filter(r => {
        if (currentReviewFilter === 'all') return true;
        return r.status === currentReviewFilter;
      });

      if (filtered.length === 0) {
        container.innerHTML = '<div class="no-bookings">No reviews under this selection.</div>';
        return;
      }

      filtered.forEach(r => {
        const card = document.createElement('div');
        card.className = `review-admin-card ${r.status}`;
        card.innerHTML = `
          <div class="review-info">
            <div class="reviewer-name">${r.name || 'Anonymous'}</div>
            <div class="review-stars">${'⭐'.repeat(r.rating || 5)}</div>
            <div class="review-comment">"${r.comment || 'No textual feedback left.'}"</div>
            <div class="review-meta">Submitted on: ${r.created_at || 'TBA'}</div>
          </div>
          <div class="review-actions">
            ${r.status === 'pending' ? `<button class="action-btn btn-approve" onclick="updateReviewStatus('${r.id}', 'approved')">Approve</button>` : ''}
            ${r.status === 'pending' ? `<button class="action-btn btn-reject" onclick="updateReviewStatus('${r.id}', 'rejected')">Reject</button>` : ''}
            <button class="action-btn btn-delete" onclick="deleteReview('${r.id}')">Delete</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function updateReviewStatus(id, status) {
      try {
        const res = await fetch(`/api/admin/reviews/${id}/status`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ status })
        });
        if (res.ok) {
          allReviews = allReviews.map(r => r.id == id ? { ...r, status } : r);
          renderReviews();
          showToast(`Review ${status}!`);
        }
      } catch (err) {
        showToast("Error updating review validation.");
      }
    }

    async function deleteReview(id) {
      if (!confirm("Permanently wipe out this review from history?")) return;
      try {
        const res = await fetch(`/api/admin/reviews/${id}`, { method: 'DELETE' });
        if (res.ok) {
          allReviews = allReviews.filter(r => r.id != id);
          renderReviews();
          showToast("Review destroyed.");
        }
      } catch (err) {
        showToast("Error deleting review.");
      }
    }

    // ══════════════════════════════════════════════════════════
    // PROFILE MANAGEMENT
    // ══════════════════════════════════════════════════════════
    async function loadProfile() {
      try {
        const res = await fetch('/api/profile');
        if (!res.ok) return;
        const profile = await res.json();
        
        document.getElementById('profileBio').value = profile.bio || '';
        document.getElementById('profilePhoto').value = profile.photo_url || '';
        document.getElementById('profileIG').value = profile.instagram || '';
        document.getElementById('profileTT').value = profile.tiktok || '';
        
        previewAvatar();
        previewSocials();
      } catch (err) {
        console.error("Failed to process profile load:", err);
      }
    }

    function previewAvatar() {
      const url = document.getElementById('profilePhoto').value.trim();
      const img = document.getElementById('adminAvatarImg');
      const fallback = document.getElementById('adminAvatarFallback');
      
      if (url) {
        img.src = url;
        img.style.display = 'block';
        fallback.style.display = 'none';
      } else {
        img.style.display = 'none';
        fallback.style.display = 'flex';
      }
    }

    function previewSocials() {
      const ig = document.getElementById('profileIG').value.trim();
      const tt = document.getElementById('profileTT').value.trim();
      const output = document.getElementById('previewSocials');
      
      let elements = [];
      if (ig) elements.push(`📸 ${ig}`);
      if (tt) elements.push(`🎵 ${tt}`);
      
      output.textContent = elements.length > 0 ? elements.join(' | ') : 'No social links set';
    }

    async function saveProfile() {
      const bio = document.getElementById('profileBio').value.trim();
      const photo_url = document.getElementById('profilePhoto').value.trim();
      const instagram = document.getElementById('profileIG').value.trim();
      const tiktok = document.getElementById('profileTT').value.trim();
      const msg = document.getElementById('profileMsg');

      try {
        const res = await fetch('/api/profile', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ bio, photo_url, instagram, tiktok })
        });
        
        if (res.ok) {
          msg.className = "profile-msg success";
          msg.textContent = "Barber profile system updated successfully!";
          setTimeout(() => msg.textContent = '', 3000);
        } else {
          throw new Error();
        }
      } catch (err) {
        msg.className = "profile-msg error";
        msg.textContent = "Error committing configuration.";
        setTimeout(() => msg.textContent = '', 3000);
      }
    }

    // Run engine setup
    window.onload = init;
  </script>
